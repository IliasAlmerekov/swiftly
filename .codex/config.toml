#:schema https://developers.openai.com/codex/config-schema.json

profile = "project"
approval_policy = "never"
web_search = "cached"
hide_agent_reasoning = false
suppress_unstable_features_warning = true

[history]
persistence = "save-all"
max_bytes = 150000000

[features]
shell_tool = true
shell_snapshot = true
unified_exec = true
apply_patch_freeform = true
multi_agent = true

[agents]
max_threads = 4
max_depth = 1

[agents.explorer]
description = "Phase 1 Research lead: read-only codebase scan with parallel sub-agents and facts-only output."
config_file = "agents/explorer.toml"

[agents.worker]
description = "Phase 4 Implementor: executes approved plan phase-by-phase with minimal production-safe patches and quality gates."
config_file = "agents/worker.toml"

[agents.reviewer]
description = "Phase 2 Design and Phase 4 review: architecture artifacts, ADRs, and compliance review with evidence."
config_file = "agents/reviewer.toml"

[agents.tester]
description = "Phase 3 Planning and test strategy specialist: phase breakdown, test plan, deterministic test updates, and gate execution."
config_file = "agents/tester.toml"

[profiles.project]
model = "gpt-5.3-codex"
model_reasoning_effort = "medium"
model_auto_compact_token_limit = 120000
temperature = 0.1
